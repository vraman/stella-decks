<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #e8e4df;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Slide viewport ── */
  #viewer {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 12px;
    position: relative;
  }

  #slide-container {
    border-radius: 4px;
    overflow: hidden;
    background: #1a2332;
    position: relative;
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
  }

  #slide-container iframe {
    width: 1280px;
    height: 720px;
    border: none;
    display: block;
    transform-origin: 0 0;
  }

  /* ── Controls ── */
  #controls {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(26, 35, 50, 0.85);
    backdrop-filter: blur(8px);
    padding: 7px 18px;
    border-radius: 6px;
    z-index: 100;
  }

  #controls button {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #controls button:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  #controls button:disabled {
    opacity: 0.3;
    cursor: default;
  }
  #controls button.active {
    background: rgba(224, 99, 112, 0.2);
    border-color: rgba(224, 99, 112, 0.5);
    color: #e06370;
  }

  #slide-counter {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.5px;
    min-width: 60px;
    text-align: center;
  }
  #slide-counter .current { color: #fff; }

  /* ── Overview grid ── */
  #overview {
    display: none;
    position: fixed;
    inset: 0;
    background: #e8e4df;
    z-index: 200;
    overflow-y: auto;
    padding: 48px;
  }
  #overview.active { display: block; }

  #overview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  #overview-title {
    font-size: 24px;
    font-weight: 600;
    color: #1a2332;
  }
  #overview-close {
    background: #1a2332;
    color: #fff;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
  }

  #overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .overview-thumb {
    aspect-ratio: 16 / 9;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .overview-thumb:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .overview-thumb.active {
    outline: 3px solid #e06370;
    outline-offset: 2px;
  }
  .overview-thumb iframe {
    width: 1280px;
    height: 720px;
    border: none;
    transform-origin: 0 0;
    pointer-events: none;
  }
  .overview-thumb-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(26, 35, 50, 0.85);
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 10px;
    letter-spacing: 0.5px;
  }

</style>
</head>
<body>

<div id="viewer">
  <div id="slide-container">
    <iframe id="slide-frame" sandbox="allow-same-origin" tabindex="-1"></iframe>
  </div>
</div>

<div id="controls">
  <button id="btn-prev" title="Previous (&larr;)">&larr; Prev</button>
  <div id="slide-counter"><span class="current">01</span> / <span id="total">01</span></div>
  <button id="btn-next" title="Next (&rarr;)">Next &rarr;</button>
  <button id="btn-overview" title="Overview (Esc)">Grid</button>
  <button id="btn-fullscreen" title="Fullscreen (F)">Full</button>
</div>

<div id="overview">
  <div id="overview-header">
    <div id="overview-title"></div>
    <button id="overview-close">Close (Esc)</button>
  </div>
  <div id="overview-grid"></div>
</div>

<script>
// ── State ──
let SLIDES = [];
let slideBasePath = '';
let deckName = '';
let current = 0;
let overviewOpen = false;
let gridBuilt = false;
const frame = document.getElementById('slide-frame');
const counter = document.querySelector('#slide-counter .current');
const totalEl = document.getElementById('total');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnOverview = document.getElementById('btn-overview');
const overview = document.getElementById('overview');
const overviewGrid = document.getElementById('overview-grid');
const overviewClose = document.getElementById('overview-close');
const overviewTitle = document.getElementById('overview-title');

// ── Deck loading ──
function getDeckParam() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('deck')) return params.get('deck');
  const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  if (path && path !== 'viewer' && !path.startsWith('viewer/')) return path;
  return 'example';
}

async function loadDeck(name) {
  deckName = name;
  let res = await fetch('../decks/' + name + '/manifest.json');
  if (!res.ok) res = await fetch('../' + name + '/manifest.json');
  if (!res.ok) throw new Error('Deck not found: ' + name);
  const manifest = await res.json();
  SLIDES = manifest.slides;
  slideBasePath = manifest.slidesPath || ('../decks/' + name + '/slides/');
  document.title = manifest.title || (name + ' — Deck Viewer');
  overviewTitle.textContent = manifest.title || name;
}

// ── Hash handling ──
function parseHash() {
  const hash = window.location.hash.replace('#', '');
  if (hash === 'grid') return { grid: true, slide: null };
  if (hash.startsWith('grid/')) {
    const num = parseInt(hash.split('/')[1], 10);
    return { grid: true, slide: (!isNaN(num) && num >= 1 && num <= SLIDES.length) ? num - 1 : null };
  }
  const num = parseInt(hash, 10);
  if (!isNaN(num) && num >= 1 && num <= SLIDES.length) return { grid: false, slide: num - 1 };
  return { grid: false, slide: 0 };
}

function setHash(value) {
  const newHash = '#' + value;
  if (window.location.hash !== newHash) {
    history.pushState(null, '', newHash);
  }
}

// ── Slide URL resolution ──
function resolveSlideUrl(slide) {
  if (slide.ref) {
    return '../decks/' + slide.ref.deck + '/slides/' + slide.ref.file;
  }
  return slideBasePath + slide.file;
}

// ── Slide navigation ──
function injectSlideNumber(iframeEl, num) {
  try {
    const doc = iframeEl.contentDocument;
    if (!doc) return;
    const el = doc.querySelector('.slide-num');
    if (el) el.textContent = num;
  } catch { /* cross-origin safety */ }
}

function loadSlide(index, fromPopState) {
  if (index < 0 || index >= SLIDES.length) return;
  current = index;
  frame.src = resolveSlideUrl(SLIDES[current]);
  const num = String(current + 1).padStart(2, '0');
  frame.onload = () => injectSlideNumber(frame, num);
  counter.textContent = num;
  if (!fromPopState) setHash(current + 1);
  updateControls();
  updateGridActiveState();
}

function updateControls() {
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === SLIDES.length - 1;
}

function updateGridActiveState() {
  document.querySelectorAll('.overview-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === current);
  });
}

function prev() { if (current > 0) loadSlide(current - 1); }
function next() { if (current < SLIDES.length - 1) loadSlide(current + 1); }

// ── Grid overview ──
function openOverview(fromPopState) {
  overviewOpen = true;
  overview.classList.add('active');
  if (!fromPopState) setHash('grid');
  if (!gridBuilt) {
    buildOverviewGrid();
    gridBuilt = true;
  }
  updateGridActiveState();
  requestAnimationFrame(() => {
    requestAnimationFrame(scaleOverviewThumbs);
  });
}

function closeOverview(fromPopState) {
  overviewOpen = false;
  overview.classList.remove('active');
  if (!fromPopState) setHash(current + 1);
}

function toggleOverview() {
  if (overviewOpen) closeOverview(); else openOverview();
}

function buildOverviewGrid() {
  overviewGrid.innerHTML = '';
  SLIDES.forEach((slide, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'overview-thumb';
    thumb.onclick = () => { loadSlide(i); closeOverview(); };

    const iframe = document.createElement('iframe');
    iframe.src = resolveSlideUrl(slide);
    iframe.sandbox = 'allow-same-origin';
    const thumbNum = String(i + 1).padStart(2, '0');
    iframe.onload = () => injectSlideNumber(iframe, thumbNum);
    thumb.appendChild(iframe);

    const label = document.createElement('div');
    label.className = 'overview-thumb-label';
    label.textContent = slide.label;
    thumb.appendChild(label);

    overviewGrid.appendChild(thumb);
  });
}

function scaleOverviewThumbs() {
  const thumbs = document.querySelectorAll('.overview-thumb');
  if (!thumbs.length) return;
  const w = thumbs[0].offsetWidth;
  if (w === 0) return;
  const scale = w / 1280;
  const h = 720 * scale;
  thumbs.forEach(thumb => {
    const iframe = thumb.querySelector('iframe');
    iframe.style.transform = `scale(${scale})`;
    thumb.style.height = h + 'px';
  });
}

// ── Fullscreen ──
const btnFullscreen = document.getElementById('btn-fullscreen');

function toggleFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
}

document.addEventListener('fullscreenchange', () => {
  btnFullscreen.textContent = document.fullscreenElement ? 'Exit' : 'Full';
});

// ── Event listeners ──
btnPrev.addEventListener('click', prev);
btnNext.addEventListener('click', next);
btnOverview.addEventListener('click', toggleOverview);
overviewClose.addEventListener('click', () => closeOverview());
btnFullscreen.addEventListener('click', toggleFullscreen);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); return; }
  if (overviewOpen) {
    if (e.key === 'Escape') closeOverview();
    return;
  }
  switch (e.key) {
    case 'ArrowLeft':  prev(); break;
    case 'ArrowRight': next(); break;
    case 'Escape':
      if (document.fullscreenElement) document.exitFullscreen();
      else openOverview();
      break;
  }
});

// ── Focus recovery ──
window.addEventListener('blur', () => {
  if (document.activeElement === frame) {
    setTimeout(() => window.focus(), 0);
  }
});
document.getElementById('viewer').addEventListener('click', () => window.focus());

window.addEventListener('popstate', () => {
  const { grid, slide } = parseHash();
  if (grid) {
    if (slide !== null) { current = slide; }
    openOverview(true);
  } else {
    if (overviewOpen) closeOverview(true);
    loadSlide(slide ?? 0, true);
  }
});

// ── Responsive ──
function resize() {
  const container = document.getElementById('slide-container');
  const vw = window.innerWidth - 24;
  const vh = window.innerHeight - 16;
  const slideW = Math.min(vw, vh * (16/9));
  container.style.width = slideW + 'px';
  container.style.height = (slideW * 9 / 16) + 'px';
  const scale = slideW / 1280;
  frame.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', () => {
  resize();
  if (overviewOpen) requestAnimationFrame(scaleOverviewThumbs);
});
resize();

// ── Init ──
(async function init() {
  try {
    await loadDeck(getDeckParam());
    totalEl.textContent = String(SLIDES.length).padStart(2, '0');
    const { grid, slide } = parseHash();
    loadSlide(slide ?? 0, true);
    if (grid) openOverview(true);
  } catch (e) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#6b7a8d;font-family:DM Sans,sans-serif;font-size:18px;">Deck not found. Check the ?deck= parameter matches a folder in decks/</div>';
  }
})();
</script>
</body>
</html>
