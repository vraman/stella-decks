<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles/deck.css">
<style>
  .slide--example-close {
    background: var(--ink);
    color: var(--white);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
  }
  .example-close__tagline {
    font-family: var(--serif);
    font-size: 56px;
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 32px;
    max-width: 800px;
  }
  .example-close__tagline em {
    font-style: italic;
    color: var(--coral);
  }
  .example-close__contact {
    font-size: 16px;
    color: var(--slate-light);
    line-height: 1.6;
  }
  .example-close__contact a {
    color: var(--coral);
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="slide slide--example-close">
  <div class="example-close__tagline anim-scale-in" data-anim-order="1">
    A closing line that <em>resonates</em>
  </div>
  <div class="example-close__contact anim-fade-in" data-anim-order="2">
    your.name@company.com<br>
    company.com
  </div>
  <div class="slide-num slide-num--dark"></div>
</div>
<script src="../../styles/anim-controller.js"></script>
</body>
</html>
