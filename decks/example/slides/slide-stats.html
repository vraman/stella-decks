<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles/deck.css">
</head>
<body>
<div class="slide slide--glance">
  <div class="section-label section-label--light anim-fade-in" data-anim-order="1">At a Glance</div>
  <h2 class="slide-title anim-slide-up" data-anim-order="2">The numbers that <em>matter</em></h2>
  <div class="glance__grid anim-stagger-children" data-anim-order="3">
    <div class="glance__card anim-scale-in">
      <div class="glance__card-value" style="color: var(--ink);">$50M</div>
      <div class="glance__card-label">Revenue</div>
      <div class="glance__card-sub">Growing 3x year over year</div>
    </div>
    <div class="glance__card anim-scale-in">
      <div class="glance__card-value" style="color: var(--coral);">94%</div>
      <div class="glance__card-label">Net Retention</div>
      <div class="glance__card-sub">Enterprise customers</div>
    </div>
    <div class="glance__card anim-scale-in">
      <div class="glance__card-value" style="color: var(--ink);">2,400+</div>
      <div class="glance__card-label">Customers</div>
      <div class="glance__card-sub">Across 30 countries</div>
    </div>
    <div class="glance__card glance__card--accent anim-scale-in">
      <div class="glance__card-value" style="color: var(--white);">Top 5%</div>
      <div class="glance__card-label">Category rank</div>
      <div class="glance__card-sub" style="color: var(--slate-light);">Per industry benchmark</div>
    </div>
  </div>
  <div class="slide-num slide-num--light"></div>
</div>
<script src="../../styles/anim-controller.js"></script>
</body>
</html>
